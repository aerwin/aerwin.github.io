# The Site Configuration

# Import the theme
theme: jekyll-theme-chirpy

# The language of the site layout › http://www.lingoes.net/en/translator/langcode.htm
# If it has the same name as one of the files in folder `_data/locales`, the layout language will also be changed,
# otherwise, the layout language will use the default value of 'en'.
lang: en

# Change to your timezone › https://kevinnovak.github.io/Time-Zone-Picker
timezone: America/Chicago

# jekyll-seo-tag settings › https://github.com/jekyll/jekyll-seo-tag/blob/master/docs/usage.md
# ↓ --------------------------

title: Tony Erwin's Tech Blog

tagline: Exploring AI, Cloud Architecture, and Modern Software Engineering

description: >-
  Technical blog focused on AI, machine learning, agentic systems, cloud architecture,
  microservices, and modern software engineering practices. Insights from building
  enterprise-scale systems at IBM and beyond.

# Fill in the protocol & hostname for your site.
# e.g. 'https://username.github.io', note that it does not end with a '/'.
url: "https://www.tonyerwin.com"

# The base path of your site
# For custom domains (like www.tonyerwin.com), this should be empty for both local and production
# If you were using username.github.io/repo-name, you would set this to "/repo-name"
baseurl: ""

github:
  username: aerwin

twitter:
  username: tonyerwin

social:
  # Change to your full name.
  # It will be displayed as the default author of the posts and the copyright owner in the Footer
  name: Tony Erwin
  email: tony@tonyerwin.com
  links:
    # The first element serves as the copyright owner's link
    - https://twitter.com/tonyerwin
    - https://github.com/aerwin
    - https://www.linkedin.com/in/tonyerwin
    - https://www.facebook.com/tonyerwin

# Site Verification Settings
webmaster_verifications:
  google: # Your Google verification code
  bing: # Your Bing verification code
  alexa: # Your Alexa verification code
  yandex: # Your Yandex verification code
  baidu: # Your Baidu verification code
  facebook: # Your Facebook verification code

# ↑ --------------------------
# The end of `jekyll-seo-tag` settings

# Web Analytics Settings
analytics:
  google:
    id: UA-58388474-1
  goatcounter:
    id: # Your GoatCounter ID
  umami:
    id: # Your Umami ID
    domain: # Your Umami domain
  matomo:
    id: # Your Matomo ID
    domain: # Your Matomo domain
  cloudflare:
    id: # Your Cloudflare Web Analytics token

# Pageviews settings
pageviews:
  provider: # now only supports 'goatcounter'

# Prefer color scheme setting.
#
# Note: Keep empty will follow the system prefer color by default,
# and there will be a toggle to switch the theme between dark and light
# on the bottom left of the sidebar.
#
# Available options:
#
#     light  - Use the light color scheme
#     dark   - Use the dark color scheme
#
theme_mode: # [light | dark]

# The CDN endpoint for media resources.
# Notice that once it is assigned, the CDN url
# will be added to all media resources (site avatar, posts' images, audio and video files) paths starting with '/'
#
# e.g. 'https://cdn.com'
cdn:

# the avatar on sidebar, support local or CORS resources
avatar: /images/avatar.jpg

# The URL of the site-wide social preview image used in SEO `og:image` meta tag.
# It can be overridden by a customized `page.image` in front matter.
social_preview_image: /images/avatar.jpg # string, local or CORS resources

# boolean type, the global switch for TOC in posts.
toc: true

comments:
  # Global switch for the post-comment system. Keeping it empty means disabled.
  provider: giscus # [disqus | utterances | giscus | staticman]
  # The provider options are as follows:
  disqus:
    shortname: tonyerwin
  # utterances settings › https://utteranc.es/
  utterances:
    repo: # <gh-username>/<repo>
    issue_term: # < url | pathname | title | ...>
  # Giscus options › https://giscus.app
  giscus:
    repo: aerwin/aerwin.github.io
    repo_id: MDEwOlJlcG9zaXRvcnk2NDU1MTY1NA==
    category: Comments
    category_id: DIC_kwDOA9j65s4C54_F
    mapping: pathname
    strict: 0
    input_position: bottom
    lang: en
    reactions_enabled: 1

# Self-hosted static assets, optional › https://github.com/cotes2020/chirpy-static-assets
assets:
  self_host:
    enabled: # boolean, keep empty means false
    # specify the Jekyll environment, empty means both
    # only works if `assets.self_host.enabled` is 'true'
    env: # [development | production]

pwa:
  enabled: true # the option for PWA feature (installable)
  cache:
    enabled: true # the option for PWA offline cache
    # Paths defined here will be excluded from the PWA cache.
    # Usually its value is the `baseurl` of another website that
    # shares the same domain name as the current website.
    deny_paths:
      # - "/example"  # URLs match `<SITE_URL>/example/*` will not be cached by the PWA

paginate: 10

# ------------ The following options are not recommended to be modified ------------------

kramdown:
  footnote_backlink: "&#8617;&#xfe0e;"
  syntax_highlighter: rouge
  syntax_highlighter_opts: # Rouge Options › https://github.com/jneen/rouge#full-options
    css_class: highlight
    # default_lang: console
    span:
      line_numbers: false
    block:
      line_numbers: true
      start_line: 1

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: post
      comments: true
      toc: true
      permalink: /:year/:month/:title.html
  - scope:
      path: _drafts
    values:
      comments: false
  - scope:
      path: ""
      type: tabs # see `site.collections`
    values:
      layout: page
      permalink: /:title/

sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: [development]

exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - tools
  - README.md
  - LICENSE
  - "*.config.js"
  - package*.json
  - Gruntfile.js
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - .ruby-version
  - .ruby-gemset
  - Gemfile.lock
  - Makefile

jekyll-archives:
  enabled: [categories, tags]
  layouts:
    category: category
    tag: tag
  permalinks:
    tag: /tags/:name/
    category: /categories/:name/

